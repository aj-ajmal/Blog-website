<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Aj Blog - Share Your Stories & Ideas | Personal Blog Platform</title>
    <meta name="title" content="Aj Blog - Share Your Stories & Ideas | Personal Blog Platform" />
    <meta name="description" content="Discover and share inspiring stories, insights, and ideas on Aj Blog. Create your own blog posts, read featured articles, and join our community of writers and readers." />
    <meta name="keywords" content="blog, personal blog, stories, articles, writing, ideas, insights, community, share, create, read" />
    <meta name="author" content="Aj Blog" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aj-blog.vercel.app/" />
    <meta property="og:title" content="Aj Blog - Share Your Stories & Ideas" />
    <meta property="og:description" content="Discover and share inspiring stories, insights, and ideas on Aj Blog. Join our community of writers and readers." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aj-blog.vercel.app/" />
    <meta property="twitter:title" content="Aj Blog - Share Your Stories & Ideas" />
    <meta property="twitter:description" content="Discover and share inspiring stories, insights, and ideas on Aj Blog. Join our community of writers and readers." />
    <meta property="twitter:image" content="/twitter-image.png" />

    <!-- Additional Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#3b82f6" />

    <!-- Favicon and App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preload Critical Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Performance Optimizations -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
